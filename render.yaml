services:
  - type: web
    name: google-hackathon
    runtime: python
    rootDir: backend
    buildCommand: >
      pip install --upgrade pip &&
      pip install --no-deps google-adk==1.33.0 &&
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
